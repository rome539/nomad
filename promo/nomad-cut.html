<title>NOMAD — the cut</title>
<style>
  :root {
    --ground: #0B0908;
    --bezel: #030202;
    --amber: #E0B25C;
    --amber-dim: #8A6D38;
    --feed: #6E5B33;
    --blood: #A63226;
    --bone: #D8D2C4;
    --gold: #F0C86A;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
  }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bezel);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); overflow: hidden; cursor: pointer;
  }
  #stage {
    position: relative; aspect-ratio: 16 / 9;
    width: min(100vw, 177.78vh);
    background: radial-gradient(ellipse 120% 90% at 50% 45%, #141009 0%, var(--ground) 55%, #060504 100%);
    overflow: hidden;
  }
  /* scanlines + rolling flicker */
  #stage::before {
    content: ""; position: absolute; inset: 0; z-index: 6; pointer-events: none;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.22) 0 1px, transparent 1px 3px);
  }
  #stage::after {
    content: ""; position: absolute; inset: 0; z-index: 7; pointer-events: none;
    background: radial-gradient(ellipse 95% 85% at 50% 50%, transparent 52%, rgba(0,0,0,0.6) 100%);
  }
  #term {
    position: absolute; inset: 0; z-index: 2; padding: 4.5% 6.5%;
    display: flex; flex-direction: column; justify-content: flex-end; gap: 0.28em;
    font-size: clamp(11px, 1.75vw, 26px); line-height: 1.5; color: var(--amber);
    text-shadow: 0 0 6px rgba(224,178,92,0.35), 0 0 18px rgba(224,178,92,0.12);
  }
  .ln { white-space: pre-wrap; overflow-wrap: break-word; }
  .cmd  { color: var(--gold); }
  .dim  { color: var(--amber-dim); }
  .feed { color: var(--feed); }
  .snd  { color: var(--feed); font-style: italic; }
  .room { color: var(--bone); letter-spacing: 0.04em; }
  .blood{ color: var(--blood); text-shadow: 0 0 8px rgba(166,50,38,0.5); }
  .bone { color: var(--bone); }
  .gold { color: var(--gold); text-shadow: 0 0 10px rgba(240,200,106,0.5); }
  .big  { font-size: 1.5em; letter-spacing: 0.04em; }
  .chips { display: flex; flex-wrap: wrap; gap: 0.5em; margin: 0.25em 0; }
  .chip { border: 1px solid var(--amber-dim); color: var(--amber-dim); padding: 0.08em 0.65em; border-radius: 2px; font-size: 0.82em; }
  .chip.lit { border-color: var(--gold); color: var(--gold); }
  .cursor { display: inline-block; width: 0.6em; height: 1.05em; background: var(--amber); vertical-align: text-bottom; animation: blink 1.05s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* Title cards */
  #card {
    position: absolute; inset: 0; z-index: 4;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 1.1em; text-align: center; background: rgba(6,5,4,0.92);
    opacity: 0; pointer-events: none; transition: opacity 0.5s ease; padding: 0 8%;
  }
  #card.show { opacity: 1; }
  #card.fast { transition: opacity 0.22s ease; }
  .card-line { color: var(--bone); font-size: clamp(18px, 3.4vw, 50px); letter-spacing: 0.12em; text-shadow: 0 0 14px rgba(216,210,196,0.25); text-wrap: balance; }
  .card-line.blood { color: var(--blood); text-shadow: 0 0 16px rgba(166,50,38,0.55); }
  .card-line.gold  { color: var(--gold);  text-shadow: 0 0 18px rgba(240,200,106,0.5); }

  /* the wordmark end card — type-forward, matches the og */
  .end { display: flex; flex-direction: column; align-items: center; gap: 0.5em; }
  .wordmark {
    color: var(--amber); font-weight: 800; font-size: clamp(56px, 13vw, 190px);
    letter-spacing: 0.02em; line-height: 1;
    text-shadow: 0 0 30px rgba(224,178,92,0.55), 0 0 90px rgba(224,178,92,0.25);
  }
  .tagsub { color: var(--bone); font-size: clamp(14px, 2.3vw, 34px); letter-spacing: 0.05em; margin-top: 0.15em; }
  .tagbody { font-size: clamp(12px, 1.7vw, 25px); letter-spacing: 0.02em; line-height: 1.55; }
  .tagbody.dim { color: var(--amber-dim); }
  .tagbody.blood { color: var(--blood); text-shadow: 0 0 10px rgba(166,50,38,0.5); }
  .url { color: var(--gold); font-weight: 800; font-size: clamp(20px, 3.4vw, 50px); letter-spacing: 0.04em; margin-top: 0.5em; text-shadow: 0 0 18px rgba(240,200,106,0.5); }

  /* effects */
  #flash { position: absolute; inset: 0; z-index: 5; pointer-events: none; opacity: 0; background: rgba(240,200,106,0.16); transition: opacity 1.1s ease; }
  #flash.on { opacity: 1; transition: opacity 0.07s ease; }
  #white { position: absolute; inset: 0; z-index: 8; pointer-events: none; opacity: 0; background: #f6ecd8; transition: opacity 0.5s ease; }
  #white.on { opacity: 1; transition: opacity 0.05s ease; }
  #black { position: absolute; inset: 0; z-index: 8; pointer-events: none; opacity: 0; background: #000; transition: opacity 0.25s ease; }
  #black.on { opacity: 1; }
  #pulse { position: absolute; inset: 0; z-index: 3; pointer-events: none; opacity: 0;
    background: radial-gradient(ellipse 100% 90% at 50% 55%, transparent 35%, rgba(166,50,38,0.5) 100%); }
  #pulse.beat { animation: beat 0.85s ease-in-out infinite; }
  @keyframes beat { 0%,100% { opacity: 0.12; } 50% { opacity: 0.5; } }

  /* the seam of light — the door, abstracted to nothing but the gap it opens */
  #seam { position: absolute; left: 50%; top: -10%; bottom: -10%; width: 2px; z-index: 9;
    transform: translateX(-50%); background: var(--gold); opacity: 0;
    box-shadow: 0 0 18px 5px rgba(240,200,106,0.75), 0 0 80px 26px rgba(240,200,106,0.32);
    transition: opacity 0.6s ease, width 1.1s cubic-bezier(0.6,0,0.85,0.45), box-shadow 1.1s ease; }
  #seam.crack { opacity: 1; }
  #seam.flood { width: 240%; box-shadow: 0 0 160px 80px rgba(240,200,106,0.6), 0 0 400px 220px rgba(240,200,106,0.25); }

  /* tremor + quake + rgb split + glitch */
  #stage.tremor #term, #stage.tremor #card { animation: tremor 0.5s linear; }
  #stage.quake  #term, #stage.quake  #card { animation: quake 0.6s linear; }
  @keyframes tremor {
    0%,100% { transform: translate(0,0); } 15% { transform: translate(-4px,2px); }
    30% { transform: translate(3px,-3px); } 45% { transform: translate(-3px,-2px); }
    60% { transform: translate(4px,2px); } 80% { transform: translate(-2px,1px); }
  }
  @keyframes quake {
    0%,100% { transform: translate(0,0); } 10% { transform: translate(-11px,6px) rotate(-0.4deg); }
    25% { transform: translate(10px,-8px) rotate(0.4deg); } 40% { transform: translate(-9px,-6px); }
    55% { transform: translate(11px,7px) rotate(-0.3deg); } 70% { transform: translate(-7px,4px); }
    85% { transform: translate(6px,-4px); }
  }
  #stage.rgb #term, #stage.rgb #card, #stage.rgb .wordmark {
    text-shadow: -3px 0 rgba(166,50,38,0.85), 3px 0 rgba(90,180,200,0.8), 0 0 10px rgba(224,178,92,0.3) !important;
  }
  #glitch { position: absolute; inset: 0; z-index: 10; pointer-events: none; opacity: 0;
    background: repeating-linear-gradient(0deg, rgba(224,178,92,0.06) 0 2px, transparent 2px 5px); mix-blend-mode: screen; }
  #glitch.on { opacity: 1; animation: gslice 0.28s steps(3) 1; }
  @keyframes gslice {
    0% { clip-path: inset(10% 0 80% 0); transform: translateX(-3%); }
    33% { clip-path: inset(60% 0 20% 0); transform: translateX(4%); }
    66% { clip-path: inset(30% 0 50% 0); transform: translateX(-2%); }
    100% { clip-path: inset(0 0 0 0); transform: translateX(0); }
  }

  #hint { position: absolute; right: 2.2%; bottom: 2.8%; z-index: 11; color: var(--amber-dim);
    font-size: clamp(9px,1vw,14px); letter-spacing: 0.15em; opacity: 0; transition: opacity 0.8s ease; }
  #hint.show { opacity: 0.85; }
  #sndhint { position: absolute; left: 2.2%; bottom: 2.8%; z-index: 12; color: var(--amber-dim);
    font-size: clamp(9px,1vw,14px); letter-spacing: 0.15em; opacity: 0; transition: opacity 0.8s ease; pointer-events: none; }
  #sndhint.show { opacity: 0.85; }
  @media (prefers-reduced-motion: reduce) {
    #stage.tremor #term, #stage.quake #term, .cursor, #pulse.beat, #glitch.on { animation: none; }
  }
</style>

<div id="stage">
  <div id="term"></div>
  <div id="card"></div>
  <div id="pulse"></div>
  <div id="flash"></div>
  <div id="seam"></div>
  <div id="glitch"></div>
  <div id="white"></div>
  <div id="black"></div>
  <div id="sndhint">CLICK FOR SOUND</div>
  <div id="hint">CLICK · REPLAY</div>
</div>

<script>
(() => {
  // ---- sound: every noise is synthesized; the same code plays live and
  // renders the mp4's audio track offline (see window.__renderAudio) ----
  const SFX = {
    _noise(ctx) {
      if (ctx.__nb) return ctx.__nb;
      const b = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
      const d = b.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      ctx.__nb = b; return b;
    },
    _burst(ctx, t, { type = "lowpass", freq = 300, q = 1, dur = 0.1, gain = 0.3, sweep = 0 }) {
      const src = ctx.createBufferSource(); src.buffer = this._noise(ctx);
      const f = ctx.createBiquadFilter(); f.type = type; f.Q.value = q;
      f.frequency.setValueAtTime(freq, t);
      if (sweep) f.frequency.exponentialRampToValueAtTime(Math.max(sweep, 20), t + dur);
      const g = ctx.createGain();
      g.gain.setValueAtTime(gain, t); g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      src.connect(f).connect(g).connect(ctx.destination);
      src.start(t, Math.random()); src.stop(t + dur + 0.05);
    },
    _tone(ctx, t, { type = "sine", f0 = 440, f1 = 0, dur = 0.3, gain = 0.2 }) {
      const o = ctx.createOscillator(); o.type = type;
      o.frequency.setValueAtTime(f0, t);
      if (f1) o.frequency.exponentialRampToValueAtTime(Math.max(f1, 1), t + dur);
      const g = ctx.createGain();
      g.gain.setValueAtTime(gain, t); g.gain.exponentialRampToValueAtTime(0.0008, t + dur);
      o.connect(g).connect(ctx.destination); o.start(t); o.stop(t + dur + 0.05);
    },
    footsteps(ctx, t, n = 8, dt = 0.34) {
      for (let i = 0; i < n; i++) {
        const tt = t + i * dt;
        this._burst(ctx, tt, { freq: 220, dur: 0.09, gain: 0.5 });
        this._tone(ctx, tt, { f0: 58, f1: 36, dur: 0.1, gain: 0.55 });
      }
    },
    boom(ctx, t) { this._tone(ctx, t, { f0: 64, f1: 28, dur: 0.9, gain: 0.9 }); this._burst(ctx, t, { freq: 140, dur: 0.35, gain: 0.5 }); },
    crack(ctx, t) {
      this._burst(ctx, t, { type: "bandpass", freq: 1900, q: 9, dur: 0.07, gain: 0.5 });
      this._tone(ctx, t + 0.02, { type: "square", f0: 640, f1: 180, dur: 0.3, gain: 0.08 });
    },
    grind(ctx, t, dur = 2.2) {
      const src = ctx.createBufferSource(); src.buffer = this._noise(ctx); src.loop = true;
      const f = ctx.createBiquadFilter(); f.type = "bandpass"; f.Q.value = 2.5;
      f.frequency.setValueAtTime(260, t); f.frequency.exponentialRampToValueAtTime(80, t + dur);
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, t); g.gain.exponentialRampToValueAtTime(0.38, t + 0.4);
      g.gain.setValueAtTime(0.38, t + dur - 0.5); g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      const lfo = ctx.createOscillator(); lfo.frequency.value = 6.5;
      const lg = ctx.createGain(); lg.gain.value = 0.16;
      lfo.connect(lg).connect(g.gain); lfo.start(t); lfo.stop(t + dur);
      src.connect(f).connect(g).connect(ctx.destination); src.start(t); src.stop(t + dur + 0.1);
      this._tone(ctx, t, { type: "sawtooth", f0: 46, f1: 40, dur, gain: 0.12 });
    },
    whoosh(ctx, t) { this._burst(ctx, t, { type: "highpass", freq: 300, sweep: 2400, dur: 1.0, gain: 0.4 }); },
    key(ctx, t)  { this._burst(ctx, t, { type: "highpass", freq: 1500, dur: 0.03, gain: 0.11 }); },
    tick(ctx, t) { this._burst(ctx, t, { type: "highpass", freq: 2400, dur: 0.015, gain: 0.045 }); },
    hit(ctx, t) {
      this._burst(ctx, t, { type: "bandpass", freq: 420, q: 1.5, dur: 0.16, gain: 0.42 });
      this._tone(ctx, t, { f0: 120, f1: 60, dur: 0.18, gain: 0.32 });
    },
    crit(ctx, t) { this.hit(ctx, t); this.crack(ctx, t + 0.02); this._tone(ctx, t, { f0: 80, f1: 30, dur: 0.5, gain: 0.5 }); },
    death(ctx, t) {
      this._tone(ctx, t, { f0: 200, f1: 34, dur: 1.8, gain: 0.5 });
      this._burst(ctx, t + 0.1, { freq: 300, sweep: 60, dur: 1.5, gain: 0.28 });
    },
    chime(ctx, t) { [523.25, 783.99, 1046.5].forEach((f, i) => this._tone(ctx, t + i * 0.09, { f0: f, dur: 1.9, gain: 0.16 })); },
    // ---- new voices for the cut ----
    glitch(ctx, t) {
      this._burst(ctx, t, { type: "highpass", freq: 1100, dur: 0.13, gain: 0.32 });
      for (let i = 0; i < 5; i++) this._tone(ctx, t + i * 0.025, { type: "square", f0: 180 + Math.random() * 1500, dur: 0.025, gain: 0.05 });
    },
    stab(ctx, t) {
      this._burst(ctx, t, { type: "bandpass", freq: 2600, q: 8, dur: 0.05, gain: 0.55 });
      this._tone(ctx, t, { f0: 170, f1: 40, dur: 0.4, gain: 0.5 });
      this._tone(ctx, t + 0.01, { type: "sawtooth", f0: 72, f1: 30, dur: 0.6, gain: 0.3 });
    },
    heart(ctx, t) {
      this._tone(ctx, t, { f0: 72, f1: 42, dur: 0.16, gain: 0.6 });
      this._tone(ctx, t + 0.27, { f0: 62, f1: 36, dur: 0.18, gain: 0.48 });
    },
    riser(ctx, t, dur = 2.6) {
      const o = ctx.createOscillator(); o.type = "sawtooth";
      o.frequency.setValueAtTime(42, t); o.frequency.exponentialRampToValueAtTime(560, t + dur);
      const f = ctx.createBiquadFilter(); f.type = "lowpass";
      f.frequency.setValueAtTime(220, t); f.frequency.exponentialRampToValueAtTime(5200, t + dur);
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, t); g.gain.exponentialRampToValueAtTime(0.2, t + dur * 0.92);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur + 0.25);
      o.connect(f).connect(g).connect(ctx.destination); o.start(t); o.stop(t + dur + 0.3);
      const src = ctx.createBufferSource(); src.buffer = this._noise(ctx); src.loop = true;
      const nf = ctx.createBiquadFilter(); nf.type = "bandpass"; nf.Q.value = 1.2;
      nf.frequency.setValueAtTime(300, t); nf.frequency.exponentialRampToValueAtTime(6500, t + dur);
      const ng = ctx.createGain();
      ng.gain.setValueAtTime(0.0001, t); ng.gain.exponentialRampToValueAtTime(0.13, t + dur * 0.95);
      ng.gain.exponentialRampToValueAtTime(0.001, t + dur + 0.2);
      src.connect(nf).connect(ng).connect(ctx.destination); src.start(t); src.stop(t + dur + 0.3);
    },
    drop(ctx, t) {
      this._tone(ctx, t, { f0: 92, f1: 30, dur: 1.6, gain: 1.0 });
      this._burst(ctx, t, { freq: 200, dur: 0.5, gain: 0.5 });
      this._tone(ctx, t, { type: "sine", f0: 55, dur: 2.4, gain: 0.5 });
    },
    pulse(ctx, t) { this._tone(ctx, t, { type: "square", f0: 55, dur: 0.13, gain: 0.11 }); this._tone(ctx, t, { type: "sine", f0: 55, dur: 0.16, gain: 0.14 }); },
    seal(ctx, t) { this.chime(ctx, t); this._tone(ctx, t, { f0: 130, f1: 260, dur: 0.4, gain: 0.12 }); },
    ambience(ctx, t, end) {
      if (end - t <= 0) return;
      const src = ctx.createBufferSource(); src.buffer = this._noise(ctx); src.loop = true;
      const f = ctx.createBiquadFilter(); f.type = "lowpass"; f.frequency.value = 140;
      const g = ctx.createGain(); g.gain.value = 0.045;
      src.connect(f).connect(g).connect(ctx.destination); src.start(t); src.stop(end);
      const o = ctx.createOscillator(); o.frequency.value = 39;
      const og = ctx.createGain(); og.gain.value = 0.028;
      const lfo = ctx.createOscillator(); lfo.frequency.value = 0.11;
      const lg = ctx.createGain(); lg.gain.value = 0.013;
      lfo.connect(lg).connect(og.gain); o.connect(og).connect(ctx.destination);
      o.start(t); o.stop(end); lfo.start(t); lfo.stop(end);
    },
  };

  let actx = null, sfxLog = [], t0Perf = performance.now();
  const sndhint = document.getElementById("sndhint");
  const updateSndHint = () => sndhint.classList.toggle("show", !(actx && actx.state === "running"));
  function ensureAudio() {
    if (!actx) { try { actx = new AudioContext(); } catch {} }
    if (actx && actx.state === "suspended") actx.resume().catch(() => {});
    if (actx) actx.onstatechange = updateSndHint;
    updateSndHint(); return actx;
  }
  function playSfx(name, ...a) {
    sfxLog.push([name, (performance.now() - t0Perf) / 1000, a]);
    if (actx && actx.state === "running") { try { SFX[name](actx, actx.currentTime + 0.02, ...a); } catch {} }
  }
  window.__renderAudio = async (dur, offset) => {
    const sr = 44100;
    const oc = new OfflineAudioContext(1, Math.ceil(sr * dur), sr);
    SFX.ambience(oc, Math.max(0, offset), dur);
    for (const [name, tRel, a] of (window.__take?.log ?? sfxLog)) {
      const t = tRel + offset;
      if (t >= 0 && t < dur - 0.05) { try { SFX[name](oc, t, ...a); } catch {} }
    }
    const buf = await oc.startRendering();
    const ch = buf.getChannelData(0);
    const ab = new ArrayBuffer(44 + ch.length * 2), v = new DataView(ab);
    const w = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
    w(0, "RIFF"); v.setUint32(4, 36 + ch.length * 2, true); w(8, "WAVEfmt ");
    v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
    v.setUint32(24, sr, true); v.setUint32(28, sr * 2, true); v.setUint16(32, 2, true);
    v.setUint16(34, 16, true); w(36, "data"); v.setUint32(40, ch.length * 2, true);
    for (let i = 0; i < ch.length; i++) v.setInt16(44 + i * 2, Math.max(-1, Math.min(1, ch[i])) * 0x7fff, true);
    const bytes = new Uint8Array(ab); let bin = "";
    for (let i = 0; i < bytes.length; i += 0x8000) bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    return btoa(bin);
  };

  const term = document.getElementById("term"), card = document.getElementById("card");
  const flash = document.getElementById("flash"), black = document.getElementById("black");
  const white = document.getElementById("white"), seam = document.getElementById("seam");
  const pulse = document.getElementById("pulse"), glitch = document.getElementById("glitch");
  const stage = document.getElementById("stage"), hint = document.getElementById("hint");
  const reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;

  let run = 0;
  const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

  function addLine(cls) {
    const el = document.createElement("div");
    el.className = "ln" + (cls ? " " + cls : "");
    term.appendChild(el);
    while (term.children.length > 13) term.removeChild(term.firstChild);
    return el;
  }
  async function typeLine(token, text, cls, cps, keys) {
    const el = addLine(cls);
    if (reduced) { el.textContent = text; await sleep(90); return; }
    const cur = document.createElement("span"); cur.className = "cursor"; el.appendChild(cur);
    for (const ch of text) {
      if (token !== run) return;
      if (keys && ch !== " ") playSfx("key");
      cur.insertAdjacentText("beforebegin", ch);
      await sleep(cps + Math.random() * cps * 0.7);
    }
    cur.remove();
  }
  const out  = (token, text, cls) => { playSfx("tick"); return typeLine(token, text, cls, 5, false); };
  const type = (token, text)      => typeLine(token, "▸ " + text, "cmd", 46, true);

  function chips(list, litIdx) {
    const row = addLine("chips");
    list.forEach((c, i) => {
      const s = document.createElement("span");
      s.className = "chip" + (i === litIdx ? " lit" : ""); s.textContent = c; row.appendChild(s);
    });
  }
  async function card1(token, html, hold, cls) {
    playSfx("riser", 1.4);
    card.className = "show" + (cls ? " " + cls : "");
    card.innerHTML = typeof html === "string" && html.startsWith("<") ? html : `<div class="card-line ${cls||''}">${html}</div>`;
    await sleep(hold); if (token !== run) return;
    card.classList.remove("show");
    term.innerHTML = "";
    await sleep(360);
  }
  function fx(cls, ms = 600) { stage.classList.remove(cls); void stage.offsetWidth; stage.classList.add(cls); setTimeout(() => stage.classList.remove(cls), ms); }
  function tremor() { playSfx("boom"); if (!reduced) fx("tremor", 520); }
  function quake()  { playSfx("boom"); if (!reduced) { fx("quake", 620); rgb(180); } }
  function rgb(ms = 160) { stage.classList.add("rgb"); setTimeout(() => stage.classList.remove("rgb"), ms); }
  function glitchHit() { playSfx("glitch"); glitch.classList.remove("on"); void glitch.offsetWidth; glitch.classList.add("on"); rgb(200); setTimeout(() => glitch.classList.remove("on"), 300); }
  async function bloom() { playSfx("seal"); flash.classList.add("on"); await sleep(130); flash.classList.remove("on"); }
  async function blackout(token, ms) { black.classList.add("on"); await sleep(ms); if (token !== run) return; black.classList.remove("on"); }

  // ACT 0 — power on: the phosphor wakes, glitches, settles
  async function powerOn(token) {
    black.classList.add("on"); await sleep(500); if (token !== run) return;
    playSfx("riser", 1.1); playSfx("glitch");
    black.classList.remove("on");
    white.classList.add("on"); await sleep(50); white.classList.remove("on");
    glitchHit();
    const boot = addLine(); boot.innerHTML = '<span class="cursor"></span>';
    await sleep(900); if (token !== run) return;
    glitchHit();
    boot.remove();
  }

  // ACT 1 — the door, abstracted to the seam of light it opens
  async function theDoor(token) {
    seam.classList.remove("crack", "flood");
    await sleep(400); if (token !== run) return;
    playSfx("footsteps", 7, 0.32);
    await sleep(1500); if (token !== run) return;
    seam.classList.add("crack"); playSfx("crack");
    await sleep(700); if (token !== run) return;
    quake();
    await sleep(500); if (token !== run) return;
    playSfx("grind", 1.6);
    await sleep(900); if (token !== run) return;
    seam.classList.add("flood"); playSfx("whoosh");
    await sleep(950); if (token !== run) return;
    white.classList.add("on"); playSfx("boom"); rgb(260);
    await sleep(260); if (token !== run) return;
    seam.classList.remove("crack", "flood");
    white.classList.remove("on");
  }

  async function play() {
    const token = ++run;
    term.innerHTML = ""; card.className = "";
    black.classList.remove("on"); white.classList.remove("on");
    pulse.classList.remove("beat"); hint.classList.remove("show");
    seam.classList.remove("crack", "flood");
    t0Perf = performance.now(); window.__t0Wall = Date.now(); sfxLog = [];
    ensureAudio();

    await powerOn(token); if (token !== run) return;
    await theDoor(token); if (token !== run) return;

    // ACT 2 — the world is alive
    await out(token, "NOMAD — the Door. You wake with keys in your pocket", "bone");
    await out(token, "and no memory of the road.", "bone");
    await sleep(500); if (token !== run) return;
    await out(token, "The Sunken Stair", "room");
    await out(token, "Steps worn to shallow bowls descend into the earth. Someone chalked tallies on the wall — hundreds of marks, then nothing.", "dim");
    chips(["look", "go down", "attack rat", "rest", "help"], -1);
    await sleep(700); if (token !== run) return;
    await out(token, "· A scabby rat creeps out of the dark.", "feed");
    await out(token, "The sounds of a fight echo below.", "snd");
    await sleep(900); if (token !== run) return;
    await card1(token, "The dungeon doesn't wait for you.", 1900);
    if (token !== run) return;

    // ACT 3 — blood
    await type(token, "go down");
    await sleep(250); if (token !== run) return;
    await out(token, "The Cold Barracks", "room");
    await out(token, "Rows of stone bunks, each one a grave-shelf. Some of the sleepers still keep their posts.", "dim");
    await sleep(400); if (token !== run) return;
    await out(token, "Fresh blood pools on the stones — something died here moments ago.", "blood");
    await sleep(300); if (token !== run) return;
    await out(token, '"Rome fell here" is scratched into the stone, half-worn.', "bone");
    await sleep(900); if (token !== run) return;

    tremor();
    await out(token, "A barrow-wight rises from a grave-shelf and fixes on you.", "bone");
    await sleep(350); if (token !== run) return;
    playSfx("hit");
    await out(token, "You cut into the barrow-wight for 7. (wounded)");
    await sleep(250); if (token !== run) return;
    playSfx("hit");
    await out(token, "It rakes you with dead hands for 6. [23/60 hp]", "blood");
    await sleep(400); if (token !== run) return;
    quake(); glitchHit();
    await out(token, "The Forgotten King wakes. The dark on the throne stands up.", "bone");
    await sleep(500); if (token !== run) return;
    pulse.classList.add("beat"); playSfx("heart");
    await out(token, "· Something big drags itself closer, below.", "snd");
    await sleep(500); if (token !== run) return;
    playSfx("crit"); quake();
    await out(token, "The Forgotten King breaks you open for 21 — a savage blow! [2/60 hp]", "blood big");
    await sleep(650); if (token !== run) return;
    playSfx("death"); blackout(token, 1500);
    await out(token, "The Forgotten King kills you.", "blood big");
    pulse.classList.remove("beat");
    await sleep(1400); if (token !== run) return;

    await card1(token, "the dead stay dead.", 2100, "blood");
    if (token !== run) return;

    // ACT 4 — what you carry
    await out(token, "You wake at the gate. Your pack lies where you fell.", "dim");
    chips(["look", "claim all", "→ vault", "stash", "rest"], 1);
    await sleep(700); if (token !== run) return;
    await type(token, "claim all");
    await sleep(300); if (token !== run) return;
    await bloom();
    await out(token, "The gate's cold iron takes the measure of a graveblade — sealed. (mint #14)", "gold");
    await out(token, "What is sealed is yours. Nothing that lives down here can take it now.", "dim");
    await sleep(600); if (token !== run) return;
    await out(token, "You turn over a dented tin — a dozen dry cigarettes, kept bone-dry through everything.", "bone");
    await out(token, "Someone went to a great deal of trouble for these.", "dim");
    await sleep(900); if (token !== run) return;

    // the knife
    glitchHit();
    await out(token, "· A wanderer steps out of the dark behind you.", "feed");
    await sleep(500); if (token !== run) return;
    playSfx("stab"); quake(); rgb(220);
    await out(token, "Steel finds your back before you turn. Everything unsealed spills to the floor.", "blood big");
    await sleep(700); if (token !== run) return;
    await card1(token, "What you carry is provisional until the gate seals it.", 2200);
    if (token !== run) return;

    // ACT 5 — the drop
    black.classList.add("on"); playSfx("riser", 2.4);
    await sleep(1500); if (token !== run) return;
    playSfx("drop"); rgb(300);
    black.classList.remove("on");
    card.className = "show fast";
    card.innerHTML =
      `<div class="end">
         <div class="wordmark">NOMAD</div>
         <div class="tagsub">a living text dungeon on Nostr</div>
         <div class="tagbody dim" style="margin-top:0.4em">your key is your character.</div>
         <div class="tagbody dim">what you carry is provisional until the gate seals it.</div>
         <div class="tagbody blood">the dead stay dead.</div>
         <div class="url">nomadmud.com</div>
       </div>`;
    await sleep(180); playSfx("chime");
    await sleep(9000); if (token !== run) return;

    hint.classList.add("show");
    window.__take = { t0: window.__t0Wall, log: sfxLog.slice() };
    await sleep(1600);
    if (token === run) play();
  }

  document.body.addEventListener("click", () => play());
  document.addEventListener("keydown", (e) => { if (e.key === "r" || e.key === "R") play(); });
  play();
})();
</script>
