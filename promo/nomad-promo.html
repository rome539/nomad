<title>NOMAD — the Door</title>
<style>
  :root {
    --ground: #0B0908;
    --bezel: #030202;
    --amber: #E0B25C;
    --amber-dim: #8A6D38;
    --feed: #6E5B33;
    --blood: #A63226;
    --bone: #D8D2C4;
    --gold: #F0C86A;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
  }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bezel);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    overflow: hidden;
    cursor: pointer;
  }
  /* The screen: 16:9, letterboxed, so a recording crops clean. */
  #stage {
    position: relative;
    aspect-ratio: 16 / 9;
    width: min(100vw, 177.78vh);
    background:
      radial-gradient(ellipse 120% 90% at 50% 45%, #141009 0%, var(--ground) 55%, #060504 100%);
    overflow: hidden;
  }
  /* scanlines + vignette */
  #stage::before {
    content: "";
    position: absolute; inset: 0; z-index: 6; pointer-events: none;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.22) 0 1px, transparent 1px 3px);
  }
  #stage::after {
    content: "";
    position: absolute; inset: 0; z-index: 7; pointer-events: none;
    background: radial-gradient(ellipse 95% 85% at 50% 50%, transparent 55%, rgba(0,0,0,0.55) 100%);
  }
  #term {
    position: absolute; inset: 0; z-index: 2;
    padding: 4.5% 6.5%;
    display: flex; flex-direction: column; justify-content: flex-end;
    gap: 0.28em;
    font-size: clamp(11px, 1.75vw, 26px);
    line-height: 1.5;
    color: var(--amber);
    text-shadow: 0 0 6px rgba(224,178,92,0.35), 0 0 18px rgba(224,178,92,0.12);
  }
  .ln { white-space: pre-wrap; overflow-wrap: break-word; }
  .cmd  { color: var(--gold); }
  .dim  { color: var(--amber-dim); }
  .feed { color: var(--feed); }
  .snd  { color: var(--feed); font-style: italic; }
  .room { color: var(--bone); letter-spacing: 0.04em; }
  .blood{ color: var(--blood); text-shadow: 0 0 8px rgba(166,50,38,0.45); }
  .bone { color: var(--bone); }
  .gold { color: var(--gold); text-shadow: 0 0 10px rgba(240,200,106,0.5); }
  .chips { display: flex; flex-wrap: wrap; gap: 0.5em; margin: 0.25em 0; }
  .chip {
    border: 1px solid var(--amber-dim); color: var(--amber-dim);
    padding: 0.08em 0.65em; border-radius: 2px; font-size: 0.82em;
  }
  .chip.lit { border-color: var(--gold); color: var(--gold); }
  .cursor {
    display: inline-block; width: 0.6em; height: 1.05em;
    background: var(--amber); vertical-align: text-bottom;
    animation: blink 1.05s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Title cards */
  #card {
    position: absolute; inset: 0; z-index: 4;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 1.2em; text-align: center;
    background: rgba(6,5,4,0.92);
    opacity: 0; pointer-events: none;
    transition: opacity 0.7s ease;
    padding: 0 8%;
  }
  #card.show { opacity: 1; }
  .card-line {
    color: var(--bone);
    font-size: clamp(18px, 3.2vw, 46px);
    letter-spacing: 0.12em;
    text-shadow: 0 0 14px rgba(216,210,196,0.25);
    text-wrap: balance;
  }
  .card-title {
    color: var(--bone);
    font-size: clamp(42px, 9vw, 130px);
    letter-spacing: 0.42em;
    margin-right: -0.42em; /* optical centering of tracked caps */
    text-shadow: 0 0 22px rgba(216,210,196,0.3);
  }
  .card-sub { color: var(--amber-dim); font-size: clamp(11px, 1.5vw, 21px); letter-spacing: 0.28em; }
  .card-pitch { color: var(--amber); font-size: clamp(14px, 2.1vw, 30px); letter-spacing: 0.06em; line-height: 1.7; text-wrap: balance; }
  .card-soon { color: var(--gold); font-size: clamp(12px, 1.6vw, 23px); letter-spacing: 0.2em; }
  .card-rule { width: 6em; border-top: 1px solid var(--amber-dim); }

  /* effects */
  #flash { position: absolute; inset: 0; z-index: 5; pointer-events: none; opacity: 0; background: rgba(240,200,106,0.14); transition: opacity 1.1s ease; }
  #flash.on { opacity: 1; transition: opacity 0.08s ease; }
  #black { position: absolute; inset: 0; z-index: 8; pointer-events: none; opacity: 0; background: #000; transition: opacity 0.25s ease; }
  #black.on { opacity: 1; }
  #stage.tremor #term { animation: tremor 0.5s linear; }
  @keyframes tremor {
    0%,100% { transform: translate(0,0); } 15% { transform: translate(-4px,2px); }
    30% { transform: translate(3px,-3px); } 45% { transform: translate(-3px,-2px); }
    60% { transform: translate(4px,2px); } 80% { transform: translate(-2px,1px); }
  }
  #hint {
    position: absolute; right: 2.2%; bottom: 2.8%; z-index: 9;
    color: var(--amber-dim); font-size: clamp(9px, 1vw, 14px); letter-spacing: 0.15em;
    opacity: 0; transition: opacity 0.8s ease;
  }
  #hint.show { opacity: 0.85; }
  #sndhint {
    position: absolute; left: 2.2%; bottom: 2.8%; z-index: 12;
    color: var(--amber-dim); font-size: clamp(9px, 1vw, 14px); letter-spacing: 0.15em;
    opacity: 0; transition: opacity 0.8s ease; pointer-events: none;
  }
  #sndhint.show { opacity: 0.85; }

  /* The approach: iron gates in the dark, and someone running at them. */
  #intro {
    position: absolute; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    background: #030202;
  }
  #intro.gone { display: none; }
  #introscene {
    position: relative;
    display: flex; gap: 0.4em;
    transform: scale(0.12);
    transition: transform 3.4s cubic-bezier(0.5, 0, 0.85, 0.4);
  }
  #introscene.arrived { transform: scale(2.3); }
  #introscene.through { transform: scale(6.5); transition: transform 1.8s cubic-bezier(0.6, 0, 0.9, 0.6); }
  #intro.bobbing #introscene { animation: bob 0.42s ease-in-out infinite alternate; }
  @keyframes bob {
    from { translate: 0 -0.5%; rotate: -0.4deg; }
    to   { translate: 0  0.5%; rotate:  0.4deg; }
  }
  .gatehalf {
    margin: 0; font-family: var(--mono);
    font-size: clamp(10px, 2.4vw, 34px); line-height: 1.05;
    color: var(--amber-dim);
    text-shadow: 0 0 8px rgba(138,109,56,0.4);
    transition: transform 2.2s cubic-bezier(0.3, 0, 0.2, 1);
  }
  #introscene.parting .gatehalf.left  { transform: translateX(-58%); }
  #introscene.parting .gatehalf.right { transform: translateX(58%); }
  #seam {
    position: absolute; left: 50%; top: -6%; bottom: -6%; width: 2px; z-index: -1;
    transform: translateX(-50%);
    background: var(--gold);
    box-shadow: 0 0 18px 4px rgba(240,200,106,0.7), 0 0 70px 22px rgba(240,200,106,0.3);
    opacity: 0; transition: opacity 1.1s ease, box-shadow 2.2s ease;
  }
  #seam.crack { opacity: 1; }
  #introscene.parting #seam {
    box-shadow: 0 0 60px 30px rgba(240,200,106,0.55), 0 0 220px 120px rgba(240,200,106,0.22);
  }
  #introtitle {
    position: absolute; left: 50%; top: 50%; z-index: -2;
    transform: translate(-50%, -50%) scale(0.92);
    color: var(--bone);
    font-size: clamp(24px, 4.6vw, 68px); letter-spacing: 0.42em; margin-right: -0.42em;
    text-shadow: 0 0 26px rgba(216,210,196,0.5);
    opacity: 0; transition: opacity 1.3s ease 1.2s, transform 2.2s ease 1.2s;
    white-space: nowrap;
  }
  #introscene.parting #introtitle { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  #introcap {
    position: absolute; left: 0; right: 0; bottom: 7%; z-index: 11;
    text-align: center; color: var(--feed); font-style: italic;
    font-size: clamp(11px, 1.5vw, 22px);
    opacity: 0; transition: opacity 0.9s ease;
  }
  #introcap.show { opacity: 1; }
  @media (prefers-reduced-motion: reduce) {
    #intro.bobbing #introscene { animation: none; }
    #introscene, .gatehalf { transition-duration: 0.4s; }
  }
  @media (prefers-reduced-motion: reduce) {
    #stage.tremor #term { animation: none; }
    .cursor { animation: none; }
  }
</style>

<div id="stage">
  <div id="term"></div>
  <div id="card"></div>
  <div id="flash"></div>
  <div id="black"></div>
  <div id="intro">
    <div id="introscene">
      <div id="introtitle">NOMAD</div>
      <div id="seam"></div>
      <pre class="gatehalf left"></pre>
      <pre class="gatehalf right"></pre>
    </div>
    <div id="introcap"></div>
  </div>
  <div id="sndhint">CLICK FOR SOUND</div>
  <div id="hint">CLICK · REPLAY</div>
</div>

<script>
(() => {
  // ---- sound: every noise is synthesized, nothing is loaded ----
  // Each voice takes (ctx, when, ...) and works on both the live
  // AudioContext and an OfflineAudioContext, so the same code that plays in
  // the browser renders the mp4's audio track.
  const SFX = {
    _noise(ctx) {
      if (ctx.__nb) return ctx.__nb;
      const b = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
      const d = b.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      ctx.__nb = b;
      return b;
    },
    _burst(ctx, t, { type = "lowpass", freq = 300, q = 1, dur = 0.1, gain = 0.3, sweep = 0 }) {
      const src = ctx.createBufferSource();
      src.buffer = this._noise(ctx);
      const f = ctx.createBiquadFilter();
      f.type = type; f.Q.value = q;
      f.frequency.setValueAtTime(freq, t);
      if (sweep) f.frequency.exponentialRampToValueAtTime(Math.max(sweep, 20), t + dur);
      const g = ctx.createGain();
      g.gain.setValueAtTime(gain, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      src.connect(f).connect(g).connect(ctx.destination);
      src.start(t, Math.random());
      src.stop(t + dur + 0.05);
    },
    _tone(ctx, t, { type = "sine", f0 = 440, f1 = 0, dur = 0.3, gain = 0.2 }) {
      const o = ctx.createOscillator();
      o.type = type;
      o.frequency.setValueAtTime(f0, t);
      if (f1) o.frequency.exponentialRampToValueAtTime(Math.max(f1, 1), t + dur);
      const g = ctx.createGain();
      g.gain.setValueAtTime(gain, t);
      g.gain.exponentialRampToValueAtTime(0.0008, t + dur);
      o.connect(g).connect(ctx.destination);
      o.start(t); o.stop(t + dur + 0.05);
    },
    footsteps(ctx, t, n = 8, dt = 0.42) {
      for (let i = 0; i < n; i++) {
        const tt = t + i * dt;
        this._burst(ctx, tt, { freq: 220, dur: 0.09, gain: 0.5 });
        this._tone(ctx, tt, { f0: 58, f1: 36, dur: 0.1, gain: 0.55 });
      }
    },
    boom(ctx, t) {
      this._tone(ctx, t, { f0: 64, f1: 28, dur: 0.9, gain: 0.9 });
      this._burst(ctx, t, { freq: 140, dur: 0.35, gain: 0.5 });
    },
    crack(ctx, t) {
      this._burst(ctx, t, { type: "bandpass", freq: 1900, q: 9, dur: 0.07, gain: 0.5 });
      this._tone(ctx, t + 0.02, { type: "square", f0: 640, f1: 180, dur: 0.3, gain: 0.08 });
    },
    grind(ctx, t, dur = 2.6) {
      const src = ctx.createBufferSource();
      src.buffer = this._noise(ctx); src.loop = true;
      const f = ctx.createBiquadFilter();
      f.type = "bandpass"; f.Q.value = 2.5;
      f.frequency.setValueAtTime(260, t);
      f.frequency.exponentialRampToValueAtTime(80, t + dur);
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.38, t + 0.4);
      g.gain.setValueAtTime(0.38, t + dur - 0.5);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      const lfo = ctx.createOscillator();
      lfo.frequency.value = 6.5;
      const lg = ctx.createGain(); lg.gain.value = 0.16;
      lfo.connect(lg).connect(g.gain);
      lfo.start(t); lfo.stop(t + dur);
      src.connect(f).connect(g).connect(ctx.destination);
      src.start(t); src.stop(t + dur + 0.1);
      this._tone(ctx, t, { type: "sawtooth", f0: 46, f1: 40, dur, gain: 0.12 });
    },
    whoosh(ctx, t) { this._burst(ctx, t, { type: "highpass", freq: 300, sweep: 2400, dur: 1.0, gain: 0.35 }); },
    key(ctx, t)    { this._burst(ctx, t, { type: "highpass", freq: 1500, dur: 0.03, gain: 0.11 }); },
    tick(ctx, t)   { this._burst(ctx, t, { type: "highpass", freq: 2400, dur: 0.015, gain: 0.045 }); },
    hit(ctx, t) {
      this._burst(ctx, t, { type: "bandpass", freq: 420, q: 1.5, dur: 0.16, gain: 0.4 });
      this._tone(ctx, t, { f0: 120, f1: 60, dur: 0.18, gain: 0.3 });
    },
    crit(ctx, t) {
      this.hit(ctx, t);
      this.crack(ctx, t + 0.02);
      this._tone(ctx, t, { f0: 80, f1: 30, dur: 0.5, gain: 0.5 });
    },
    death(ctx, t) {
      this._tone(ctx, t, { f0: 200, f1: 34, dur: 1.8, gain: 0.45 });
      this._burst(ctx, t + 0.1, { freq: 300, sweep: 60, dur: 1.5, gain: 0.25 });
    },
    chime(ctx, t) {
      [523.25, 783.99, 1046.5].forEach((f, i) => this._tone(ctx, t + i * 0.09, { f0: f, dur: 1.9, gain: 0.15 }));
    },
    squink(ctx, t) {
      const o = ctx.createOscillator();
      o.type = "square";
      o.frequency.setValueAtTime(260, t);
      o.frequency.exponentialRampToValueAtTime(1180, t + 0.12);
      o.frequency.exponentialRampToValueAtTime(220, t + 0.26);
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.15, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      o.connect(g).connect(ctx.destination);
      o.start(t); o.stop(t + 0.35);
    },
    swell(ctx, t, dur = 2.2) {
      const f = ctx.createBiquadFilter();
      f.type = "lowpass"; f.frequency.value = 320;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.15, t + dur * 0.5);
      g.gain.exponentialRampToValueAtTime(0.0008, t + dur);
      for (const fr of [55, 82.5]) {
        const o = ctx.createOscillator();
        o.type = "sawtooth"; o.frequency.value = fr;
        o.connect(f);
        o.start(t); o.stop(t + dur + 0.1);
      }
      f.connect(g).connect(ctx.destination);
    },
    ambience(ctx, t, end) {
      if (end - t <= 0) return;
      const src = ctx.createBufferSource();
      src.buffer = this._noise(ctx); src.loop = true;
      const f = ctx.createBiquadFilter();
      f.type = "lowpass"; f.frequency.value = 140;
      const g = ctx.createGain(); g.gain.value = 0.045;
      src.connect(f).connect(g).connect(ctx.destination);
      src.start(t); src.stop(end);
      const o = ctx.createOscillator(); o.frequency.value = 39;
      const og = ctx.createGain(); og.gain.value = 0.028;
      const lfo = ctx.createOscillator(); lfo.frequency.value = 0.11;
      const lg = ctx.createGain(); lg.gain.value = 0.013;
      lfo.connect(lg).connect(og.gain);
      o.connect(og).connect(ctx.destination);
      o.start(t); o.stop(end); lfo.start(t); lfo.stop(end);
    },
  };

  let actx = null;
  let sfxLog = [];
  let t0Perf = performance.now();
  const sndhint = document.getElementById("sndhint");

  function updateSndHint() {
    sndhint.classList.toggle("show", !(actx && actx.state === "running"));
  }
  function ensureAudio() {
    if (!actx) { try { actx = new AudioContext(); } catch {} }
    if (actx && actx.state === "suspended") actx.resume().catch(() => {});
    if (actx) actx.onstatechange = updateSndHint;
    updateSndHint();
    return actx;
  }
  // Every sound is logged with its trailer-relative time, so the capture rig
  // can re-render the whole track offline, sample-aligned to the frames.
  function playSfx(name, ...a) {
    sfxLog.push([name, (performance.now() - t0Perf) / 1000, a]);
    if (actx && actx.state === "running") {
      try { SFX[name](actx, actx.currentTime + 0.02, ...a); } catch {}
    }
  }
  window.__renderAudio = async (dur, offset) => {
    const sr = 44100;
    const oc = new OfflineAudioContext(1, Math.ceil(sr * dur), sr);
    SFX.ambience(oc, Math.max(0, offset), dur);
    for (const [name, tRel, a] of (window.__take?.log ?? sfxLog)) {
      const t = tRel + offset;
      if (t >= 0 && t < dur - 0.05) { try { SFX[name](oc, t, ...a); } catch {} }
    }
    const buf = await oc.startRendering();
    const ch = buf.getChannelData(0);
    const ab = new ArrayBuffer(44 + ch.length * 2);
    const v = new DataView(ab);
    const w = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
    w(0, "RIFF"); v.setUint32(4, 36 + ch.length * 2, true); w(8, "WAVEfmt ");
    v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
    v.setUint32(24, sr, true); v.setUint32(28, sr * 2, true); v.setUint16(32, 2, true);
    v.setUint16(34, 16, true); w(36, "data"); v.setUint32(40, ch.length * 2, true);
    for (let i = 0; i < ch.length; i++) {
      v.setInt16(44 + i * 2, Math.max(-1, Math.min(1, ch[i])) * 0x7fff, true);
    }
    const bytes = new Uint8Array(ab);
    let bin = "";
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  };

  const term  = document.getElementById("term");
  const card  = document.getElementById("card");
  const flash = document.getElementById("flash");
  const black = document.getElementById("black");
  const stage = document.getElementById("stage");
  const hint  = document.getElementById("hint");
  const reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;

  let run = 0; // restart token: any stale runner sees a new value and dies
  const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

  function addLine(cls) {
    const el = document.createElement("div");
    el.className = "ln" + (cls ? " " + cls : "");
    term.appendChild(el);
    while (term.children.length > 14) term.removeChild(term.firstChild);
    return el;
  }

  async function typeLine(token, text, cls, cps, keys) {
    const el = addLine(cls);
    if (reduced) { el.textContent = text; await sleep(120); return; }
    const cur = document.createElement("span");
    cur.className = "cursor";
    el.appendChild(cur);
    for (const ch of text) {
      if (token !== run) return;
      if (keys && ch !== " ") playSfx("key");
      cur.insertAdjacentText("beforebegin", ch);
      await sleep(cps + Math.random() * cps * 0.7);
    }
    cur.remove();
  }

  // the dungeon speaks quickly; a hand on the keys is slower, and audible
  const out  = (token, text, cls) => { playSfx("tick"); return typeLine(token, text, cls, 7, false); };
  const type = (token, text)      => typeLine(token, "▸ " + text, "cmd", 52, true);

  function chips(list, litIdx) {
    const row = addLine("chips");
    list.forEach((c, i) => {
      const s = document.createElement("span");
      s.className = "chip" + (i === litIdx ? " lit" : "");
      s.textContent = c;
      row.appendChild(s);
    });
  }

  async function showCard(token, html, hold) {
    playSfx("swell");
    card.innerHTML = html;
    card.classList.add("show");
    await sleep(hold);
    if (token !== run) return;
    card.classList.remove("show");
    term.innerHTML = ""; // each act opens on a clean phosphor
    await sleep(750);
  }

  function tremor() {
    playSfx("boom");
    if (reduced) return;
    stage.classList.remove("tremor");
    void stage.offsetWidth;
    stage.classList.add("tremor");
  }

  async function bloom() {
    playSfx("chime");
    flash.classList.add("on");
    await sleep(120);
    flash.classList.remove("on");
  }

  async function blackout(token, ms) {
    black.classList.add("on");
    await sleep(ms);
    if (token !== run) return;
    black.classList.remove("on");
  }

  const line = (html) => `<div class="card-line">${html}</div>`;

  // The Broken Gate, in the iron it deserves.
  const GATE_HALF = [
    " ▲  ▲  ▲  ▲  ▲ ",
    "╔══╦══╦══╦══╦══╗",
    "║  ║  ║  ║  ║  ║",
    "║  ║  ║  ║  ║  ║",
    "╠══╬══╬══╬══╬══╣",
    "║  ║  ║  ║  ║  ║",
    "║  ║  ║  ║  ║  ║",
    "║  ║  ║  ║  ║  ║",
    "╠══╬══╬══╬══╬══╣",
    "║  ║  ║  ║  ║  ║",
    "║  ║  ║  ║  ║  ║",
    "╚══╩══╩══╩══╩══╝",
  ].join("\n");

  const intro    = document.getElementById("intro");
  const scene    = document.getElementById("introscene");
  const seam     = document.getElementById("seam");
  const introcap = document.getElementById("introcap");

  async function caption(token, text, hold) {
    introcap.textContent = text;
    introcap.classList.add("show");
    await sleep(hold);
    if (token !== run) return;
    introcap.classList.remove("show");
    await sleep(500);
  }

  async function runToTheDoor(token) {
    document.querySelector(".gatehalf.left").textContent = GATE_HALF;
    document.querySelector(".gatehalf.right").textContent = GATE_HALF;
    intro.classList.remove("gone");
    scene.classList.remove("arrived", "parting", "through");
    seam.classList.remove("crack");
    introcap.classList.remove("show");
    await sleep(reduced ? 300 : 900); if (token !== run) return;

    // the run: the gate swells out of the dark, the ground jolts underfoot
    intro.classList.add("bobbing");
    scene.classList.add("arrived");
    playSfx("footsteps", 8, 0.42);
    caption(token, "Footsteps hammer the stone.", 1900);
    await sleep(reduced ? 400 : 3400); if (token !== run) return;
    intro.classList.remove("bobbing");
    tremor();
    await sleep(700); if (token !== run) return;

    // the gate gives
    seam.classList.add("crack");
    playSfx("crack");
    await caption(token, "Iron grinds against stone.", 1300); if (token !== run) return;
    scene.classList.add("parting");
    playSfx("grind");
    await sleep(reduced ? 600 : 2300); if (token !== run) return;

    // through
    scene.classList.add("through");
    playSfx("whoosh");
    await sleep(reduced ? 300 : 1300); if (token !== run) return;
    black.classList.add("on");
    await sleep(650); if (token !== run) return;
    intro.classList.add("gone");
    black.classList.remove("on");
  }

  async function play() {
    const token = ++run;
    term.innerHTML = "";
    card.classList.remove("show");
    black.classList.remove("on");
    hint.classList.remove("show");
    t0Perf = performance.now();
    window.__t0Perf = t0Perf;
    window.__t0Wall = Date.now();
    sfxLog = [];
    ensureAudio();

    await runToTheDoor(token); if (token !== run) return;

    // cold open
    const boot = addLine();
    boot.innerHTML = '<span class="cursor"></span>';
    await sleep(1500); if (token !== run) return;
    boot.remove();
    await out(token, "NOMAD — the Door. You are Ashdrifter.", "bone");
    await out(token, "Type 'help' if you're lost.", "dim");
    await sleep(1100); if (token !== run) return;

    // the gate, alive
    await out(token, "The Broken Gate", "room");
    await out(token, "Iron gates hang off their hinges, rusted open a hundred years ago. Cold air drifts up from below, carrying the smell of wet stone. Everyone comes back here, eventually.", "dim");
    chips(["look", "go north", "attack rat", "rest", "help"], -1);
    await sleep(1300); if (token !== run) return;
    await out(token, "· A scabby rat creeps out of the dark.", "feed");
    await sleep(700); if (token !== run) return;
    await out(token, "Slow, heavy footfalls sound to the north.", "snd");
    await sleep(1700); if (token !== run) return;

    await showCard(token, line("The dungeon doesn't wait."), 2600);
    if (token !== run) return;

    // what the stones remember
    await type(token, "go north");
    await sleep(350); if (token !== run) return;
    await out(token, "The Long Hall", "room");
    await out(token, "A vaulted hall running out of sight in the gloom. To the north stands a door of black iron, older than the rest of this place, and shut.", "dim");
    await sleep(500); if (token !== run) return;
    await out(token, "Fresh blood pools on the stones — something died here moments ago.", "blood");
    await sleep(400); if (token !== run) return;
    await out(token, '"Rome fell here" is scratched into the stone, half-worn.', "bone");
    await sleep(800); if (token !== run) return;
    await out(token, "The sounds of a fight echo to the east.", "snd");
    await sleep(1800); if (token !== run) return;

    await showCard(token, line("It remembers you."), 2600);
    if (token !== run) return;

    // the King
    await type(token, "go north");
    await sleep(350); if (token !== run) return;
    await out(token, "The Undercroft", "room");
    await out(token, "A throne of piled stone faces the door, and the dark on it is thicker than dark should be.", "dim");
    await sleep(700); if (token !== run) return;
    tremor();
    await out(token, "The Forgotten King remembers you — and comes for you.", "bone");
    await sleep(600); if (token !== run) return;
    playSfx("hit");
    await out(token, "You hit the Forgotten King for 9. (wounded)");
    await sleep(500); if (token !== run) return;
    tremor();
    await out(token, "The Forgotten King rises from the throne. The dark rises with him.", "bone");
    await sleep(600); if (token !== run) return;
    playSfx("crit");
    await out(token, "The Forgotten King hits you for 16 — a savage blow! [4/40 hp]", "blood");
    await sleep(900); if (token !== run) return;
    playSfx("death");
    await out(token, "The Forgotten King kills you.", "blood");
    await sleep(1100); if (token !== run) return;
    await blackout(token, 1300); if (token !== run) return;
    await out(token, "Darkness. Then the gate, again. Your pack lies where you fell.", "dim");
    await sleep(2000); if (token !== run) return;

    await showCard(token, line("Get out with what you can carry."), 2600);
    if (token !== run) return;

    // the seal
    await out(token, "The Broken Gate", "room");
    chips(["look", "go north", "claim all", "stash blade", "rest"], 2);
    await sleep(1200); if (token !== run) return;
    await type(token, "claim all");
    await sleep(500); if (token !== run) return;
    await bloom();
    await out(token, "The gate's cold iron takes the measure of a graveblade — sealed. (mint #14)", "gold");
    await out(token, "What is sealed is yours. Nothing that lives down here can take it now.", "dim");
    await sleep(1900); if (token !== run) return;

    // one last thing
    await type(token, "squink");
    await sleep(400); if (token !== run) return;
    playSfx("squink");
    await out(token, "You squink. Somewhere below, something squinks back.");
    await sleep(2100); if (token !== run) return;

    // the name
    await showCard(
      token,
      `<div class="card-title">NOMAD</div>
       <div class="card-sub">NOSTR OPEN MULTI-USER ADVENTURE DUNGEON</div>
       <div class="card-rule"></div>
       <div class="card-pitch">The dungeon doesn't wait for players.<br>Players enter the simulation.</div>
       <div class="card-sub">A PERSISTENT MULTIPLAYER SIMULATION · TEXT IS THE ART</div>
       <div class="card-soon">THE DOOR OPENS SOON</div>`,
      12000,
    );
    if (token !== run) return;
    hint.classList.add("show");
    // freeze this run's sound log before the loop resets it (capture rig reads it)
    window.__take = { t0: window.__t0Wall, log: sfxLog.slice() };
    await sleep(1500);
    if (token === run) play(); // loop for ambient display and long recordings
  }

  document.body.addEventListener("click", () => play());
  document.addEventListener("keydown", (e) => { if (e.key === "r" || e.key === "R") play(); });
  play();
})();
</script>
